services:
  # 后端API服务
  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: dockerpanel-backend-dev
    working_dir: /app
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - HTTP_PORT=80
      - ENABLE_HTTPS=false
      - Logging__LogLevel__Default=Debug
      - Logging__LogLevel__Microsoft.AspNetCore=Information
    volumes:
      - ./Backend/DockerPanel.API:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - dockerpanel_dev_data:/app/Data
    networks:
      - dockerpanel-dev-network
    restart: unless-stopped
    command: ["dotnet", "watch", "run", "--urls", "http://+:80"]

  # 前端开发服务
  frontend:
    build:
      context: Frontend
      dockerfile: Dockerfile.dev
    container_name: dockerpanel-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_WS_URL=ws://localhost:5000/hubs
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    networks:
      - dockerpanel-dev-network
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  dockerpanel_dev_data:
    driver: local

networks:
  dockerpanel-dev-network:
    driver: bridge