services:
  dockerpanel:
    image: j4587698/dockerpanel:latest
    container_name: dockerpanel-app
    ports:
      # HTTP-01 ACME 校验必须从公网 80 端口访问；HTTPS 使用 443 提供 SNI 证书服务。
      - "${DOCKERPANEL_HTTP_HOST_PORT:-80}:80"
      - "${DOCKERPANEL_HTTPS_HOST_PORT:-443}:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORT=80
      - HTTPS_PORT=443
      - ENABLE_HTTPS=true
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      # 首次使用可预置管理员账号，建议显式设置
      # - DOCKERPANEL_ADMIN_USERNAME=admin
      # - DOCKERPANEL_ADMIN_PASSWORD=ChangeMe!123
      # 生产环境建议显式配置 JWT 密钥，否则每次重建会重新生成导致登录失效
      # - DOCKERPANEL_JWT_SECRET=your-strong-secret-here
    volumes:
      # 挂载Docker socket以允许管理Docker容器
      - /var/run/docker.sock:/var/run/docker.sock
      # 持久化数据存储（含自动生成的 JWT 密钥）
      - dockerpanel_data:/app/Data
      # 日志文件
      - dockerpanel_logs:/app/Logs
    networks:
      - dockerpanel-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dockerpanel_data:
    driver: local
  dockerpanel_logs:
    driver: local

networks:
  dockerpanel-network:
    driver: bridge
    name: dockerpanel-network
